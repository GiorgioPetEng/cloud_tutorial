<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="todo-card" aria-labelledby="todo-title">
        <p class="eyebrow">Daily Focus</p>
        <div class="heading-row">
          <div>
            <h1 id="todo-title">Todo List</h1>
            <p class="subtitle">Capture a task, keep the list tidy, and clear items when they are done.</p>
          </div>
          <div class="status-badge" aria-hidden="true">Simple JS</div>
        </div>

        <form class="todo-form" id="todo-form">
          <label class="sr-only" for="todo-input">Add a todo</label>
          <input
            id="todo-input"
            name="todo"
            type="text"
            placeholder="Add a todo"
            autocomplete="off"
            maxlength="120"
          />
          <button type="submit">Add</button>
        </form>

        <p class="helper-text" id="helper-text" role="status">Add your first task to get started.</p>
        <ul class="todo-list" id="todo-list" aria-live="polite"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
